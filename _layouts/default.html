<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-brand">
        <span class="brand-icon">⋈</span>
        <span class="brand-text">Minería de Datos</span>
      </a>
      <nav class="site-nav">
        <span class="nav-author">Dr. Ernesto Cuadros-Vargas</span>
        <a href="{{ '/' | relative_url }}" class="nav-link">Inicio</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-text">{{ site.title }} &mdash; {{ site.description }}</span>
      <span class="footer-author">Dr. Ernesto Cuadros-Vargas &mdash; <a href="mailto:ecuadros@spc.org.pe">ecuadros@spc.org.pe</a></span>
    </div>
  </footer>

</body>
</html>
